name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      # Integration suites boot Postgres/Redis/Kafka via testcontainers; the
      # ubuntu-latest runner ships Docker, so no service containers needed here.
      - name: Test (unit + integration)
        run: npm test

  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
